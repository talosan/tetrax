<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TETRAX – Block Puzzle Game</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0e1a;
      color: #d0d8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .logo {
      font-size: 52px;
      font-weight: 900;
      letter-spacing: 8px;
      color: #38BEFF;
      font-family: 'Courier New', monospace;
      margin-bottom: 8px;
    }
    .logo span { color: #FF7A3D; }
    .tagline {
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #5a7090;
      margin-bottom: 48px;
    }
    .desc {
      max-width: 480px;
      text-align: center;
      font-size: 16px;
      color: #8090b0;
      line-height: 1.8;
      margin-bottom: 40px;
    }
    .btn {
      display: inline-block;
      background: #38BEFF;
      color: #000;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 14px 36px;
      border-radius: 6px;
      text-decoration: none;
      margin-bottom: 60px;
    }
    .links {
      display: flex;
      gap: 32px;
      font-size: 13px;
    }
    .links a {
      color: #3a5070;
      text-decoration: none;
    }
    .links a:hover { color: #38BEFF; }
    footer {
      margin-top: 60px;
      font-size: 12px;
      color: #2a3a55;
    }
  </style>
</head>
<body>
  <div class="logo">TETR<span>AX</span></div>
  <div class="tagline">Block Puzzle Game</div>
  <p class="desc">
    A classic block puzzle experience for Android. Simple to learn, endlessly challenging.
    Available on Google Play.
  </p>
  <a class="btn" href="https://play.google.com/store/apps/details?id=com.tetrax.game">Get it on Google Play</a>
  <div class="links">
    <a href="privacy.html">Privacy Policy</a>
  </div>
  <footer>&copy; 2025 Tap Tap Droid</footer>
</body>
</html>
