            <div><div style="font-size:10px;font-weight:700;color:var(--white);letter-spacing:1px;">${T.drag}</div><div style="font-size:9px;color:var(--mid);margin-top:2px;">${T.dragSub}</div></div>
          </div>
          <div style="background:rgba(255,122,61,0.07);border:1px solid rgba(255,122,61,0.22);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;">
            <span style="font-size:24px;flex-shrink:0;">⚡</span>
            <div><div style="font-size:10px;font-weight:700;color:var(--white);letter-spacing:1px;">${T.flick}</div><div style="font-size:9px;color:var(--mid);margin-top:2px;">${T.flickSub}</div></div>
          </div>
        </div>

        <!-- Récord personal -->
        <div id="start-best" style="margin-bottom:clamp(18px,3.5vh,28px);text-align:center;display:none;">
          <div style="font-size:9px;letter-spacing:3px;color:var(--mid);margin-bottom:6px;">${T.personalBest}</div>
          <div id="start-best-val" style="font-family:var(--font-display);font-size:clamp(22px,5vw,36px);font-weight:700;color:var(--green);text-shadow:0 0 16px rgba(94,240,138,0.5);">0</div>
        </div>

        <!-- Botón -->
        <button class="btn" id="ob-start" style="
          font-size:clamp(11px,2.5vw,16px);letter-spacing:4px;
          padding:clamp(15px,2.5vh,20px) clamp(24px,6vw,60px);
          min-width:clamp(200px,55vw,280px);
          white-space:nowrap;
          background:rgba(56,190,255,0.08);
          border:1.5px solid var(--accent);
          box-shadow:0 0 24px rgba(56,190,255,0.2);
          transition:background .15s, box-shadow .15s;
        ">▶ &nbsp;${T.newGame}</button>

        <div style="font-size:8px;color:var(--dim);letter-spacing:2px;margin-top:16px;">v6 HD · TETRAX</div>
      </div>`);
    on('ob-start',startGame);

    // Piezas cayendo de fondo en el canvas de la pantalla de inicio
    setTimeout(()=>startBgAnim(), 50);

    // Récord personal
    const bestScore = Math.max(0,...highScores);
    if(bestScore > 0){
      const el = document.getElementById('start-best');
      if(el){ el.style.display='block'; document.getElementById('start-best-val').textContent = bestScore.toLocaleString(); }
    }

    ovls.pause=mkOvl(cw,'pause',`
      <div class="ovl-title" style="font-size:clamp(22px,4vw,40px);">${T.paused}</div>
      <div class="ovl-sub" style="margin-bottom:22px;">${T.gamePaused}</div>
      <button class="btn" id="ob-resume">${T.resume}</button>`);
    on('ob-resume',togglePause);

    ovls.gameover=mkOvl(cw,'gameover',`
      <div class="ovl-title" style="color:var(--orange);font-size:clamp(20px,3.5vw,36px);">${T.gameOver}</div>
      <div class="ovl-score" id="go-score">0</div>
      <div class="ovl-det"   id="go-det"></div>
      <button class="btn" id="ob-continue" style="border-color:var(--green);color:var(--green);display:none;">
        ▶ &nbsp;${T.continueAd}
      </button>
      <button class="btn"   id="ob-retry">${T.playAgain}</button>
      <button class="btn o" id="ob-menu">${T.mainMenu}</button>`);
    on('ob-retry',()=>{hideOvl('gameover');startGame();});
    on('ob-menu', ()=>{hideOvl('gameover');showOvl('start');init();render();setTimeout(()=>startBgAnim(),50);});
    on('ob-continue', ()=>{ window.TetraxBridge?.showRewarded(); });

    // Mostrar botón continuar solo si el bridge está disponible
    // (no en navegador, sí en la app Android)
    if(window.TetraxBridge) {
      const btn = document.getElementById('ob-continue');
      if(btn) btn.style.display = 'block';
    }

    ovls.start.classList.remove('hidden');
  }
  let startBgAnimId = null; // ID del loop de animación de fondo

  function startBgAnim() {
    const canvas = document.getElementById('start-bg');
    if(!canvas) return;

    // Cancelar animación anterior si existe
    if(startBgAnimId) { cancelAnimationFrame(startBgAnimId); startBgAnimId = null; }

    // Resetear dimensiones del canvas antes de arrancar
    canvas.width = 0; canvas.height = 0;

    const tryStart = () => {
      const W = canvas.offsetWidth;
      const H = canvas.offsetHeight;
      if(!W || !H) { startBgAnimId = requestAnimationFrame(tryStart); return; }

      const ctx2 = canvas.getContext('2d');
      canvas.width  = W;
      canvas.height = H;

    const COLORS = ['#00E5FF','#FFE033','#CC44FF','#3DFF7A','#FF4B5C','#4D9FFF','#FF8C3D'];
    const CS = Math.max(18, Math.floor(W / 18)); // tamaño celda

    // Generar piezas flotantes
    const pieces = [];
    for(let i = 0; i < 12; i++) {
      pieces.push({
        x: Math.random() * W,
        y: Math.random() * H - H,
        speed: 0.4 + Math.random() * 0.8,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        blocks: [[0,0],[1,0],[0,1],[1,1]], // O-piece por defecto
        rot: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.01,
        alpha: 0.3 + Math.random() * 0.4,
      });
      // Asignar forma aleatoria
      const shapes = [
        [[0,0],[1,0],[0,1],[1,1]],        // O
        [[0,0],[1,0],[2,0],[3,0]],        // I
        [[1,0],[0,1],[1,1],[2,1]],        // T
        [[0,0],[0,1],[1,1],[2,1]],        // J
        [[2,0],[0,1],[1,1],[2,1]],        // L
        [[1,0],[2,0],[0,1],[1,1]],        // S
        [[0,0],[1,0],[1,1],[2,1]],        // Z
      ];
      pieces[i].blocks = shapes[Math.floor(Math.random() * shapes.length)];
    }

    let animId;
    function drawBg() {
      // Solo dibujar si el overlay de inicio está visible
      const ovl = document.getElementById('ovl-start');
      if(!ovl || ovl.classList.contains('hidden')) { cancelAnimationFrame(animId); return; }

      ctx2.clearRect(0, 0, W, H);
      pieces.forEach(p => {
        p.y += p.speed;
        p.rot += p.rotSpeed;
        if(p.y > H + CS*4) { p.y = -CS*4; p.x = Math.random()*W; }
        ctx2.save();
        ctx2.globalAlpha = p.alpha;
        const cx = p.x + CS;
        const cy = p.y + CS;
        ctx2.translate(cx, cy);
        ctx2.rotate(p.rot);
        p.blocks.forEach(([bx,by]) => {
          const px = (bx - 1.5) * CS;
          const py = (by - 1.5) * CS;
          ctx2.fillStyle = p.color;
          ctx2.fillRect(px+1, py+1, CS-2, CS-2);
          // Highlight top
          ctx2.fillStyle = 'rgba(255,255,255,0.3)';
          ctx2.fillRect(px+1, py+1, CS-2, CS*0.2);
        });
        ctx2.restore();
      });
      animId = requestAnimationFrame(drawBg);
    }
    startBgAnimId = requestAnimationFrame(drawBg);
    }; // fin tryStart
    startBgAnimId = requestAnimationFrame(tryStart);
  }

  function mkOvl(p,id,html){const el=document.createElement('div');el.className='ovl hidden';el.id='ovl-'+id;el.innerHTML=html;p.appendChild(el);return el;}
  function on(id,fn){const el=document.getElementById(id);if(!el)return;el.addEventListener('click',fn);el.addEventListener('touchend',e=>{e.preventDefault();fn();},{passive:false});}
  function showOvl(name){
    if(name==='gameover'){
      document.getElementById('go-score').textContent=score.toLocaleString();
      document.getElementById('go-det').textContent=`${T.level} ${level} · ${lines} ${T.lines}`;
      const btnContinue = document.getElementById('ob-continue');
      if(btnContinue){
        const available = window.TetraxBridge?.isRewardedReady?.() ?? false;
        btnContinue.style.display = available ? 'block' : 'none';
      }
    }
    Object.values(ovls).forEach(o=>o.classList.add('hidden'));ovls[name].classList.remove('hidden');
  }
  function hideOvl(name){ovls[name].classList.add('hidden');}

  // ─── Game loop ───────────────────────────────────
  // Architecture: yAcc accumulates fall progress [0..1) each frame.
  // When yAcc >= 1 we try to drop one row. No separate lastTime/dropInt timer.
  // softDropActive multiplies fall speed by SOFT_DROP_MULT.
  // This means the drop is always smooth — no step-timer interference.
  const SOFT_DROP_MULT = 12; // soft drop is 12× faster than gravity

  let prevFrameTime = 0;

  function startGame(){
    Object.values(ovls).forEach(o=>o.classList.add('hidden'));
    init(); started=true; prevFrameTime=0;
    Audio.startMusic(); resizeCanvas();
    requestAnimationFrame(loop);
  }
  function togglePause(){
    if(!started||gameOver)return;
    paused=!paused;
    if(paused){ Audio.stopMusic(); showOvl('pause'); }
    else{ Audio.startMusic(); hideOvl('pause'); prevFrameTime=0; requestAnimationFrame(loop); }
  }

  function loop(now){
    if(paused||gameOver)return;

    // dt in seconds, capped to avoid spiral-of-death after tab switch
    if(prevFrameTime===0) prevFrameTime=now;
    const dt = Math.min((now-prevFrameTime)/1000, 0.1);
    prevFrameTime=now;

    if(cur){
      // ── Gravity accumulator ───────────────────────
      // dropSpeed = rows per second. SPD values are ms per row, so:
      const dropSpeedRPS = 1000 / SPD[level-1]; // rows/sec at current level
      const effectiveSpeed = softDropActive
        ? dropSpeedRPS * SOFT_DROP_MULT
        : dropSpeedRPS;

      yAcc += effectiveSpeed * dt;

      // Drop as many rows as accumulated
      while(yAcc >= 1){
        yAcc -= 1;
        if(fits(cur,0,1)){
          cur.y++;
          if(softDropActive) score+=1;
        } else {
          yAcc=0;
          break;
        }
      }

      // If piece is resting, clamp yAcc and keep lock timer running
      if(!fits(cur,0,1)){ yAcc=0; sl(); }

      // ── Smooth horizontal lerp ────────────────────
      // xVisual chases cur.x. Speed: 12 cells/sec minimum, scales with distance.
      const xDiff = cur.x - xVisual;
      if(Math.abs(xDiff)<0.005){
        xVisual=cur.x;
      } else {
        xVisual += xDiff * Math.min(1, (12 + Math.abs(xDiff)*8) * dt);
      }
    }

    render(dt);
    [0,1,2].forEach(i=>{
      const p=i===0?nxt:new Piece(peek(i-1));
      const c=ncList[i];
      renderMini(nctxList[i],p,c.clientWidth||112,c.clientHeight||48);
    });
    requestAnimationFrame(loop);
  }

  // ─── Keyboard ────────────────────────────────────
  const ks={},krT={},krI={};
  document.addEventListener('keydown',e=>{
    if(ks[e.code])return; ks[e.code]=true;
    if(!started||gameOver){if(e.code==='Enter'||e.code==='Space')startGame();return;}
    if(paused&&e.code==='KeyP'){togglePause();return;}
    if(paused)return;
    switch(e.code){
      case 'ArrowLeft':  ml(); krT['ArrowLeft'] =setTimeout(()=>{krI['ArrowLeft'] =setInterval(()=>{if(ks['ArrowLeft']) ml();},50);},170); break;
      case 'ArrowRight': mr(); krT['ArrowRight']=setTimeout(()=>{krI['ArrowRight']=setInterval(()=>{if(ks['ArrowRight'])mr();},50);},170); break;
      case 'ArrowDown':  softDropActive=true; break;
      case 'ArrowUp': case 'KeyX': rot(1); break;
      case 'KeyZ':  rot(-1); break;
      case 'Space': e.preventDefault(); hd(); break;
      case 'KeyC':  hold(); break;
      case 'KeyP':  togglePause(); break;
    }
  });
  document.addEventListener('keyup',e=>{
    ks[e.code]=false;
    if(e.code==='ArrowDown') softDropActive=false;
    clearTimeout(krT[e.code]); clearInterval(krI[e.code]);
    delete krT[e.code]; delete krI[e.code];
  });

  // ─── Gesture system ───────────────────────────────
  // Horizontal: pixel accumulator — proportional to drag speed, no steps.
  // Vertical: softDropActive flag while finger is dragging downward.
  // Tap = rotate. Fast flick down = hard drop. Fast flick up = rotate CCW.
  const HORIZ_PX   = 0.52; // fraction of CELL to move one column
  const AXIS_PX    = 9;    // px before axis is committed
  const FLICK_Y    = 100;  // px for hard-drop flick
  const FLICK_MS   = 280;
  const TAP_PX     = 12;
  const TAP_MS     = 200;

  let gActive=false, gStartX=0, gStartY=0, gStartMs=0;
  let gAxisH=false, gAxisV=false, gHAccum=0;
  let gLastX=0, gLastY=0;

  const gestureArea=document.getElementById('canvas-area');

  gestureArea.addEventListener('touchstart',e=>{
    if(!started||paused||gameOver)return;
    e.preventDefault(); Audio.init(); Audio.resume();
    const t=e.changedTouches[0];
    gStartX=gLastX=t.clientX; gStartY=gLastY=t.clientY;
    gStartMs=performance.now();
    gHAccum=0; gAxisH=false; gAxisV=false; gActive=true;
    softDropActive=false;
  },{passive:false});

  gestureArea.addEventListener('touchmove',e=>{
    if(!gActive||!started||paused||gameOver)return;
    e.preventDefault();
    const t=e.changedTouches[0];
    const dx=t.clientX-gLastX;
    const dy=t.clientY-gLastY;
    gLastX=t.clientX; gLastY=t.clientY;

    const totalDx=Math.abs(t.clientX-gStartX);
    const totalDy=t.clientY-gStartY;

    if(!gAxisH&&!gAxisV){
      if(totalDx>AXIS_PX) gAxisH=true;
      else if(totalDy>AXIS_PX){ gAxisV=true; softDropActive=true; }
    }

    if(gAxisH){
      gHAccum+=dx;
      const threshold=CELL*HORIZ_PX;
      while(gHAccum>= threshold){ mr(); gHAccum-=threshold; }
      while(gHAccum<=-threshold){ ml(); gHAccum+=threshold; }
    }
    // gAxisV → softDropActive already set above; gravity loop handles the drop
  },{passive:false});

  gestureArea.addEventListener('touchend',e=>{
    if(!gActive||!started||paused||gameOver)return;
    e.preventDefault(); gActive=false; softDropActive=false;
    const t=e.changedTouches[0];
    const totalDx=Math.abs(t.clientX-gStartX);
    const totalDy=t.clientY-gStartY;
    const elapsed=performance.now()-gStartMs;
    if(!gAxisH&&totalDy>FLICK_Y&&elapsed<FLICK_MS){ hd(); return; }
    if(!gAxisH&&totalDy<-FLICK_Y&&elapsed<FLICK_MS){ rot(-1); return; }
    if(totalDx<TAP_PX&&Math.abs(totalDy)<TAP_PX&&elapsed<TAP_MS) rot(1);
  },{passive:false});

  // ─── Touch buttons ────────────────────────────────
  function addTouch(id,fn){
    const el=document.getElementById(id); if(!el)return;
    el.addEventListener('touchstart',e=>{
      e.preventDefault(); e.stopPropagation();
      Audio.init(); Audio.resume();
      if(started&&!paused&&!gameOver)fn();
    },{passive:false});
    el.addEventListener('mousedown',e=>{e.preventDefault();if(started&&!paused&&!gameOver)fn();});
  }

  // Accelerating auto-repeat for left/right buttons
  function addTouchRepeat(id, fn, delay0=160, minMs=40, factor=0.80){
    const el=document.getElementById(id); if(!el)return;
    let tid=null;
    function startRepeat(){
      if(!started||paused||gameOver)return;
      fn();
      let ms=delay0;
      function sched(){ tid=setTimeout(()=>{ if(started&&!paused&&!gameOver)fn(); ms=Math.max(minMs,ms*factor); sched(); },ms); }
      sched();
    }
    function stopRepeat(){ clearTimeout(tid); tid=null; }
    el.addEventListener('touchstart',e=>{ e.preventDefault(); Audio.init(); Audio.resume(); startRepeat(); },{passive:false});
    el.addEventListener('touchend',  e=>{ e.preventDefault(); stopRepeat(); },{passive:false});
    el.addEventListener('touchcancel',()=>stopRepeat());
    el.addEventListener('mousedown', ()=>startRepeat());
    el.addEventListener('mouseup',   ()=>stopRepeat());
    el.addEventListener('mouseleave',()=>stopRepeat());
  }

  // Down button: sets softDropActive while held
  function addTouchDown(id){
    const el=document.getElementById(id); if(!el)return;
    const on=e=>{ e.preventDefault(); Audio.init(); Audio.resume(); if(started&&!paused&&!gameOver) softDropActive=true; };
    const off=e=>{ e.preventDefault(); softDropActive=false; };
    el.addEventListener('touchstart', on, {passive:false});
    el.addEventListener('touchend',   off,{passive:false});
    el.addEventListener('touchcancel',off,{passive:false});
    el.addEventListener('mousedown',  ()=>{ if(started&&!paused&&!gameOver) softDropActive=true; });
    el.addEventListener('mouseup',    ()=>softDropActive=false);
    el.addEventListener('mouseleave', ()=>softDropActive=false);
  }

  addTouchRepeat('tb-left',  ml);
  addTouchRepeat('tb-right', mr);
  addTouchDown('tb-down');
  addTouch('tb-rot',  ()=>rot(1));
  addTouch('tb-drop', hd);
  addTouch('tb-hold', hold);
  document.getElementById('tb-pause').addEventListener('touchstart',e=>{e.preventDefault();togglePause();},{passive:false});
  document.getElementById('tb-pause').addEventListener('click',togglePause);

  // ─── Visibility ───────────────────────────────────
  document.addEventListener('visibilitychange',()=>{
    if(document.hidden){
      Audio.stopMusic();
      if(started&&!paused&&!gameOver){paused=true;showOvl('pause');}
    } else {
      if(started&&!paused&&!gameOver)Audio.startMusic();
    }
  });

  // ─── Header controls ─────────────────────────────
  document.getElementById('btn-sound').addEventListener('click',()=>{
    const on=Audio.toggleSfx();
    document.getElementById('btn-sound').textContent=on?'🔊':'🔇';
    document.getElementById('btn-sound').classList.toggle('on',on);
  });
  let buttonsVisible=true;
  document.getElementById('btn-buttons').addEventListener('click',()=>{
    buttonsVisible=!buttonsVisible;
    document.getElementById('touch-bar').classList.toggle('hidden',!buttonsVisible);
    document.getElementById('btn-buttons').classList.toggle('on',buttonsVisible);
  });
  document.getElementById('btn-sound').classList.add('on');

  // ─── Boot ────────────────────────────────────────
  init();
  makeOverlays();

  (function applyLayout() {
    const W = window.innerWidth, H = window.innerHeight;
    const isPortrait = H > W;
    const isNarrow   = W < 480;
    document.body.classList.toggle('is-portrait',  isPortrait);
    document.body.classList.toggle('is-landscape', !isPortrait);
    document.body.classList.toggle('is-wide',   isPortrait && !isNarrow);
    document.body.classList.toggle('is-narrow', isPortrait && isNarrow);
  })();

  requestAnimationFrame(() => requestAnimationFrame(() => {
    resizeCanvas();
    render();
    renderHS();
  }));

  window.addEventListener('resize', resizeCanvas);

  /*
    AdMob integration points:
    - Banner: <div id="ad-banner"> above #header, 50px, loaded by Android Activity
    - Interstitial (game over): window.TetraxBridge?.showInterstitial()
    - Rewarded (continue): window.TetraxBridge?.showRewarded()
  */
</script>
</body>
